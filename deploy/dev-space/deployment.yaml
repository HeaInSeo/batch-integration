apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-space-observability
  namespace: dev-space
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-space-observability
  template:
    metadata:
      labels:
        app: dev-space-observability
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: site
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: site
          configMap:
            name: dev-space-observability-site
