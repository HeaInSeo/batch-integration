apiVersion: v1
kind: ServiceAccount
metadata:
  name: jumi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jumi
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["workloads"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jumi
subjects:
  - kind: ServiceAccount
    name: jumi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jumi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jumi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jumi
  template:
    metadata:
      labels:
        app: jumi
    spec:
      serviceAccountName: jumi
      containers:
        - name: jumi
          image: ghcr.io/heainseo/jumi:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
          env:
            - name: JUMI_HTTP_ADDR
              value: ":8080"
            - name: JUMI_GRPC_ADDR
              value: ":9090"
            - name: JUMI_NAMESPACE
              value: "batch-int-dev"
            - name: JUMI_AH_URL
              value: "http://artifact-handoff.batch-int-dev.svc.cluster.local:8080"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: jumi
spec:
  selector:
    app: jumi
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
